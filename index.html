<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard de Indicadores — Laboratório Apolo</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --navy:#071d3d;--blue:#0f3d82;--mid:#1565c0;
  --bg:#f0f4f9;--border:#d4dfe9;
  --green:#1a9e58;--red:#d32f2f;
  --text:#1a2540;--muted:#5d6e85;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text)}

/* HEADER */
header{background:var(--blue);display:flex;align-items:center;gap:22px;padding:0 32px;height:96px;box-shadow:0 3px 14px rgba(0,0,0,.3)}
.logo-box{background:transparent;border:none;width:100px;height:100px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;padding:4px}
.logo-box img{width:100%;height:100%;object-fit:contain;display:block}
.hdr-t h1{color:#fff;font-size:1.5rem;font-weight:700;letter-spacing:.2px}
.hdr-t p{color:rgba(255,255,255,.62);font-size:.82rem;margin-top:3px}
.hdr-r{margin-left:auto;text-align:right;color:#fff;font-size:.78rem}
.badge{display:inline-block;background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:3px 10px;margin-top:4px;font-size:.73rem}

/* TABS */
.tabs{background:var(--navy);display:flex;padding:0 32px}
.tab-btn{background:none;border:none;cursor:pointer;color:rgba(255,255,255,.48);font-size:.88rem;font-weight:600;padding:12px 24px;border-bottom:3px solid transparent;transition:.15s}
.tab-btn:hover{color:#fff}
.tab-btn.active{color:#fff;border-bottom-color:#5ab5ff}

/* FILTER BAR */
.fbar{background:#fff;border-bottom:1px solid var(--border);padding:9px 28px;display:flex;align-items:center;flex-wrap:wrap;gap:7px}
.fbar-lbl{font-size:.73rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.mbtn{background:var(--bg);border:1px solid var(--border);color:var(--muted);font-size:.77rem;font-weight:600;padding:4px 11px;border-radius:20px;cursor:pointer;transition:.15s}
.mbtn:hover{background:#dceeff;border-color:var(--mid);color:var(--blue)}
.mbtn.active{background:var(--blue);border-color:var(--blue);color:#fff}
.mbtn.empty{opacity:.28;cursor:default;pointer-events:none}
.fbar-r{margin-left:auto;display:flex;gap:8px;align-items:center}
.btn-save{background:var(--blue);color:#fff;border:none;padding:5px 14px;border-radius:6px;font-size:.78rem;font-weight:600;cursor:pointer}
.btn-save:hover{background:var(--navy)}
.btn-clr{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 11px;border-radius:6px;font-size:.78rem;cursor:pointer}
.btn-clr:hover{border-color:var(--red);color:var(--red)}
.save-ok{font-size:.73rem;color:var(--green);font-weight:700}

/* COVERAGE TIMELINE */
.covbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 28px 8px}
.cov-tl{position:relative;width:100%}
.cov-tl-track{position:absolute;top:11px;left:11px;right:11px;height:2px;background:var(--border);border-radius:1px}
.cov-tl-fill{position:absolute;top:0;left:0;height:2px;background:var(--green);border-radius:1px;transition:width .35s ease}
.cov-tl-marks{display:flex;justify-content:space-between;position:relative}
.cov-tl-m{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
.cov-tl-m:hover .cov-tl-pin{transform:scale(1.18)}
.cov-tl-pin{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;z-index:1;transition:transform .15s}
.cov-tl-pin.ok{background:var(--green);color:#fff}
.cov-tl-pin.no{background:#fff;border:1.5px solid var(--border);color:var(--muted)}
.cov-tl-pin.sel{box-shadow:0 0 0 3px rgba(26,158,88,.28)}
.cov-tl-lbl{font-size:9px;color:var(--muted);letter-spacing:.2px}
.cov-tl-foot{display:flex;justify-content:flex-end;margin-top:5px;font-size:.72rem;color:var(--muted)}

/* ERROR */
#err{display:none;background:#fde8e8;color:var(--red);padding:12px 28px;font-size:.84rem;font-weight:600;border-bottom:2px solid var(--red)}

/* PANEL */
.panel{display:none}
.panel.active{display:block}

/* MAIN */
main{padding:22px 28px;max-width:1380px;margin:0 auto}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(172px,1fr));gap:13px;margin-bottom:24px}
.kpi{background:#fff;border-radius:10px;padding:16px 17px;box-shadow:0 1px 6px rgba(0,0,0,.07);border-left:4px solid var(--mid);position:relative}
.kpi.ok{border-left-color:var(--green)}
.kpi.nok{border-left-color:var(--red)}
.kpi-lb{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-bottom:4px}
.kpi-val{font-size:1.48rem;font-weight:800;line-height:1.1}
.kpi-sub{font-size:.68rem;color:var(--muted);margin-top:4px}
.kpi-ic{position:absolute;top:12px;right:12px;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.8rem}
.kpi-ic.ok{background:#d3f4e3;color:var(--green)}
.kpi-ic.nok{background:#fde8e8;color:var(--red)}

/* KPI NOVO LAYOUT — MISTO */
.kpi-summary{display:flex;align-items:center;gap:14px;margin-bottom:16px;padding:13px 18px;background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,.07);flex-wrap:wrap}
.kpi-score-big{font-size:34px;font-weight:700;color:var(--text);line-height:1}
.kpi-score-of{font-size:12px;color:var(--muted);margin-top:2px}
.kpi-divider{width:1px;height:40px;background:var(--border);flex-shrink:0}
.kpi-pills{display:flex;flex-direction:column;gap:5px}
.kpi-pill{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;padding:3px 10px;border-radius:20px;font-weight:600;width:fit-content}
.kpi-pill.ok{background:#d3f4e3;color:#1a9e58}
.kpi-pill.nok{background:#fde8e8;color:#d32f2f}
.kpi-legend{margin-left:auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.kpi-leg-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.kpi-leg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.kpi-sec-lbl{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:8px;padding:0 2px}
.kpi-hero-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:14px}
.kpi-hcard{background:#fff;border-radius:12px;padding:15px 17px;position:relative;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.kpi-hcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--red)}
.kpi-hcat{display:inline-flex;align-items:center;gap:5px;font-size:10px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;padding:2px 8px;border-radius:4px;margin-bottom:8px}
.kpi-hcard-lbl{font-size:11.5px;color:var(--muted);margin-bottom:3px}
.kpi-hcard-val{font-size:24px;font-weight:700;color:var(--text);line-height:1.1}
.kpi-hcard-note{font-size:10px;color:var(--muted);margin-top:2px}
.kpi-hcard-ic{position:absolute;top:13px;right:13px;width:21px;height:21px;border-radius:50%;background:#fde8e8;color:var(--red);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.kpi-prog-wrap{margin-top:10px}
.kpi-prog-bg{background:#f0f4f9;border-radius:3px;height:5px;overflow:hidden}
.kpi-prog-fill{height:5px;border-radius:3px;background:var(--red)}
.kpi-prog-labels{display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--muted)}
.kpi-list{display:flex;flex-direction:column;gap:3px;margin-bottom:24px}
.kpi-row2{display:grid;grid-template-columns:10px 1fr 82px 150px 44px;align-items:center;gap:10px;padding:8px 12px;border-radius:8px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.kpi-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.kpi-rname{font-size:12.5px;color:var(--text)}
.kpi-rval{font-size:12.5px;font-weight:700;color:var(--text);text-align:right}
.kpi-bar-wrap{display:flex;align-items:center;gap:6px}
.kpi-bar-bg{flex:1;height:5px;background:#f0f4f9;border-radius:3px;overflow:hidden}
.kpi-bar-fill{height:5px;border-radius:3px}
.kpi-bar-meta{font-size:10px;color:var(--muted);white-space:nowrap;text-align:right}
.kpi-badge-ok{font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:5px;background:#d3f4e3;color:#1a9e58;text-align:center;white-space:nowrap}

/* KPI V2 — GRID UNIFORME */
.kpi-v2-sum{display:flex;align-items:center;background:var(--navy);border-radius:12px;padding:16px 22px;margin-bottom:16px;gap:0}
.kpi-v2-blk{display:flex;flex-direction:column;align-items:center;padding:0 22px}
.kpi-v2-blk-n{font-size:38px;font-weight:800;line-height:1}
.kpi-v2-blk-l{font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-top:3px;color:rgba(255,255,255,.55)}
.kpi-v2-sdiv{width:1px;background:rgba(255,255,255,.12);height:50px;flex-shrink:0}
.kpi-v2-leg{flex:1;display:flex;flex-wrap:wrap;gap:10px 16px;align-items:center;justify-content:flex-end;padding-left:22px}
.kpi-v2-legit{display:flex;align-items:center;gap:5px;font-size:10.5px;color:rgba(255,255,255,.55)}
.kpi-v2-legdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kpi-v2-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(168px,1fr));gap:10px;margin-bottom:24px}
.kpi-v2-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 1px 5px rgba(0,0,0,.07);display:flex;flex-direction:column;transition:box-shadow .15s}
.kpi-v2-card:hover{box-shadow:0 3px 12px rgba(0,0,0,.12)}
.kpi-v2-bar-top{height:3px;flex-shrink:0}
.kpi-v2-inner{padding:13px 14px 12px;flex:1;display:flex;flex-direction:column}
.kpi-v2-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.kpi-v2-cat{display:flex;align-items:center;gap:4px;font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.45px;color:var(--muted)}
.kpi-v2-cdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.kpi-v2-status{width:19px;height:19px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0}
.kpi-v2-status.ok{background:#d3f4e3;color:#1a9e58}
.kpi-v2-status.nok{background:#fde8e8;color:#d32f2f}
.kpi-v2-name{font-size:11.5px;color:var(--text);font-weight:500;line-height:1.35;margin-bottom:7px;flex:1}
.kpi-v2-val{font-size:1.42rem;font-weight:800;color:var(--text);line-height:1;letter-spacing:-.3px}
.kpi-v2-note{font-size:9.5px;color:var(--muted);margin-top:2px;margin-bottom:9px}
.kpi-v2-prog-bg{background:#f0f4f9;border-radius:3px;height:4px;overflow:hidden;margin-bottom:5px}
.kpi-v2-prog-fill{height:4px;border-radius:3px}
.kpi-v2-meta{font-size:9.5px;color:var(--muted)}

/* SECTION HEADER */
.shdr{display:flex;align-items:center;gap:9px;margin:26px 0 13px}
.shdr h2{font-size:.9rem;font-weight:700;color:var(--bd);white-space:nowrap}
.shdr-line{flex:1;height:2px;background:var(--border)}
.shdr-ic{width:28px;height:28px;border-radius:7px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}

/* CHARTS */
.cgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(410px,1fr));gap:16px;margin-bottom:4px}
.ccard{background:#fff;border-radius:10px;padding:17px 19px;box-shadow:0 1px 6px rgba(0,0,0,.07)}
.ccard.wide{grid-column:1/-1}
.ctitle{font-size:.82rem;font-weight:700;margin-bottom:2px}
.csub{font-size:.7rem;color:var(--muted);margin-bottom:12px}
.cwrap{position:relative;height:215px}
.cwrap canvas{position:absolute;inset:0;width:100%!important;height:100%!important}

/* MONTH TABLE */
.mtable-wrap{background:#fff;border-radius:11px;box-shadow:0 2px 10px rgba(0,0,0,.08);overflow:hidden;margin-bottom:26px}
.mtable-hdr{background:var(--blue);color:#fff;padding:13px 20px;font-size:.96rem;font-weight:700}
.mtable-hdr small{opacity:.7;font-size:.77rem;font-weight:400;margin-left:10px}
table.mt{width:100%;border-collapse:collapse}
table.mt th{background:var(--navy);color:rgba(255,255,255,.8);font-size:.71rem;font-weight:700;text-transform:uppercase;letter-spacing:.4px;padding:9px 15px;text-align:left}
table.mt td{padding:8px 15px;font-size:.8rem;border-bottom:1px solid var(--border);vertical-align:top}
table.mt tr:last-child td{border-bottom:none}
table.mt tr.cat td{background:#eaf2fb;color:var(--bd);font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:5px 15px}
.st-ok{color:var(--green);font-weight:700}
.st-nok{color:var(--red);font-weight:700}
.st-nd{color:#bbb}
.obs{font-size:.71rem;color:var(--muted);font-style:italic;margin-top:2px}

/* EDIT MODAL */
#edit-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:8000;align-items:flex-start;justify-content:center;padding:28px 12px 40px;overflow-y:auto}
#edit-overlay.show{display:flex}
#edit-box{background:#fff;border-radius:14px;padding:28px 30px;width:min(720px,96vw);box-shadow:0 8px 40px rgba(0,0,0,.3)}
#edit-box h2{font-size:1.05rem;color:var(--blue);margin-bottom:14px}
.esel-row{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin-bottom:18px;padding-bottom:14px;border-bottom:2px solid #e8f0fb}
.esel-row label{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
.esel-row select{border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-size:.85rem;color:var(--text);background:#f8fafc;cursor:pointer}
.esel-row select:focus{outline:none;border-color:var(--blue)}
.edsec{margin-bottom:16px}
.edsec-hdr{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--blue);padding:5px 0;border-bottom:2px solid #deeaff;margin-bottom:8px}
.edrow{display:grid;grid-template-columns:1fr 110px 36px 90px 1fr;gap:6px;align-items:center;padding:7px 4px;border-bottom:1px solid #f2f5fb}
.edrow:last-child{border-bottom:none}
.edlb{font-size:.81rem;color:var(--text);line-height:1.3}
.edmeta{font-size:.68rem;color:var(--muted);margin-top:2px}
.edinput{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:.83rem;text-align:right;width:100%}
.edinput:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 2px rgba(15,61,130,.12)}
.edunit{font-size:.7rem;color:var(--muted);text-align:center}
.edmetainput{border:1px solid #c5d5e8;border-radius:6px;padding:5px 8px;font-size:.83rem;text-align:right;width:100%;background:#f5f0ff}
.edmetainput:focus{outline:none;border-color:#7f77dd;box-shadow:0 0 0 2px rgba(127,119,221,.15)}
.edobsinput{border:1px solid var(--border);border-radius:6px;padding:5px 8px;font-size:.77rem;color:var(--muted);width:100%}
.edobsinput:focus{outline:none;border-color:var(--blue)}
.edrow-hd{display:grid;grid-template-columns:1fr 110px 36px 90px 1fr;gap:6px;font-size:.69rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding:4px 4px 8px;border-bottom:1px solid var(--border);margin-bottom:4px}
.edit-footer{display:flex;justify-content:flex-end;gap:10px;margin-top:22px;padding-top:16px;border-top:1px solid #e8f0fb}
.btn-edsave{background:var(--blue);color:#fff;border:none;padding:9px 24px;border-radius:8px;font-size:.85rem;font-weight:600;cursor:pointer}
.btn-edsave:hover{background:var(--navy)}
.btn-edcancel{background:none;border:1px solid var(--border);color:var(--muted);padding:8px 18px;border-radius:7px;cursor:pointer;font-size:.82rem}
.btn-edcancel:hover{border-color:var(--red);color:var(--red)}

/* IMPORT BUTTON */
.btn-import{background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:6px 14px;border-radius:7px;font-size:.8rem;font-weight:600;cursor:pointer;transition:.15s;white-space:nowrap}
.btn-import:hover{background:rgba(255,255,255,0.28)}
/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a2540;color:#fff;padding:12px 24px;border-radius:10px;font-size:.85rem;font-weight:600;box-shadow:0 4px 18px rgba(0,0,0,.35);z-index:9999;display:none;max-width:520px;text-align:center}
#toast.ok{border-left:4px solid #1a9e58}
#toast.err{border-left:4px solid #d32f2f}
/* IMPORT OVERLAY */
#imp-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:8000;align-items:center;justify-content:center}
#imp-overlay.show{display:flex}
#imp-box{background:#fff;border-radius:14px;padding:32px 36px;max-width:460px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.3);text-align:center}
#imp-box h2{font-size:1.1rem;color:#0f3d82;margin-bottom:8px}
#imp-box p{font-size:.85rem;color:#5d6e85;margin-bottom:20px;line-height:1.5}
#imp-drop{border:2px dashed #b0c4de;border-radius:10px;padding:30px 20px;cursor:pointer;transition:.2s;margin-bottom:16px}
#imp-drop:hover,#imp-drop.over{border-color:#0f3d82;background:#f0f6ff}
#imp-drop span{font-size:2rem;display:block;margin-bottom:8px}
#imp-drop p{font-size:.82rem;color:#5d6e85;margin:0}
#imp-file{display:none}
#imp-cancel{background:none;border:1px solid #d4dfe9;color:#5d6e85;padding:7px 18px;border-radius:7px;cursor:pointer;font-size:.82rem}
#imp-cancel:hover{border-color:#d32f2f;color:#d32f2f}
#imp-status{font-size:.82rem;color:#1a9e58;font-weight:600;min-height:20px;margin-top:10px}

@media(max-width:700px){
  header,main,.tabs,.fbar,.covbar{padding-left:14px;padding-right:14px}
  .cgrid{grid-template-columns:1fr}
  .kpi-row{grid-template-columns:repeat(2,1fr)}
  .kpi-bar-wrap,.kpi-legend,.kpi-divider{display:none}
  .kpi-row2{grid-template-columns:10px 1fr 70px 44px;gap:7px}
  .kpi-summary{gap:10px}
  .kpi-v2-grid{grid-template-columns:repeat(2,1fr)}
  .kpi-v2-leg{display:none}
}
</style>
</head>
<body>

<header>
  <div class="logo-box">
    <img id="logo-img" src="logo_apolo.png" alt="Apolo"
      onerror="this.src='logo_apolo.svg';this.onerror=function(){this.style.display='none';document.getElementById('logo-txt').style.display='block'}">
    <span id="logo-txt" style="display:none;color:#fff;font-size:.72rem;font-weight:800;text-align:center">APOLO</span>
  </div>
  <div class="hdr-t">
    <h1>Dashboard de Indicadores</h1>
    <p>Laboratório de Análises Apolo &middot; FR-061</p>
  </div>
  <div class="hdr-r">
    <div id="hdr-date"></div>
    <div id="hdr-badge" class="badge" style="display:none"></div>
    <div style="margin-top:6px">
      <button class="btn-import" onclick="openEdit()" style="margin-right:6px">✏️ Editar Dados</button>
      <button class="btn-import" onclick="openImport()">📥 Importar Excel</button>
    </div>
  </div>
</header>

<!-- MODAL IMPORTAÇÃO -->
<div id="imp-overlay">
  <div id="imp-box">
    <h2>📊 Importar Planilha Excel</h2>
    <p>Selecione o arquivo <strong>FR 061 - Planilha de Indicadores</strong>.<br>Os dados de todos os anos presentes no arquivo serão atualizados.</p>
    <div id="imp-drop" onclick="document.getElementById('imp-file').click()"
         ondragover="event.preventDefault();this.classList.add('over')"
         ondragleave="this.classList.remove('over')"
         ondrop="event.preventDefault();this.classList.remove('over');handleFiles(event.dataTransfer.files)">

Chart.register({
  id: 'metaLine',
  afterDatasetsDraw: function(chart) {
    var cfg = chart.options.plugins && chart.options.plugins.metaLine;
    if (!cfg || cfg.value === undefined || cfg.value === null) return;
    var ctx = chart.ctx;
    var ca  = chart.chartArea;
    var yS  = chart.scales && chart.scales.y;
    if (!yS) return;
    var yPx = yS.getPixelForValue(cfg.value);
    if (yPx < ca.top || yPx > ca.bottom) return;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(ca.left,  yPx);
    ctx.lineTo(ca.right, yPx);
    ctx.strokeStyle = '#c0192b';
    ctx.lineWidth   = 2;
    ctx.setLineDash([7, 4]);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle   = '#c0192b';
    ctx.font        = 'bold 10px Segoe UI,sans-serif';
    ctx.textAlign   = 'right';
    ctx.fillText('Meta: ' + cfg.label, ca.right - 4, yPx - 5);
    ctx.restore();
  }
});

/* ═══════════════════════════════════════════
   FORMATOS
═══════════════════════════════════════════ */
function fmt(v, un) {
  if (v === null || v === undefined) return '—';
  if (un==='n')  return Math.round(v).toLocaleString('pt-BR');
  if (un==='%')  return v.toFixed(2) + '%';
  if (un==='h')  return v + 'h';
  if (un==='kg') return v.toLocaleString('pt-BR',{minimumFractionDigits:1,maximumFractionDigits:1})+' kg';
  return String(v);
}
function fmtMeta(d) {
  var v = d.meta;
  if (d.un==='n')  return Math.round(v).toLocaleString('pt-BR');
  if (d.un==='%')  return v+'%';
  if (d.un==='h')  return v+'h';
  if (d.un==='kg') return v+' kg';
  return String(v);
}
function mStr(d) { return d.mt ? d.mt : ((d.lo?'< ':'≥ ')+fmtMeta(d)); }
function isOk(v, d) {
  if (v===null||v===undefined) return null;
  return d.lo ? v<d.meta : v>=d.meta;
}
function lastFilled(arr) {
  for (var i=arr.length-1;i>=0;i--) { if (arr[i]!==null&&arr[i]!==undefined) return {v:arr[i],m:i}; }
  return null;
}

function updateCov() {
  var ref = DATA[AY].atendimentos.v;
  var h='', cnt=0, lastIdx=-1;
  for (var i=0;i<12;i++) {
    var has = ref[i]!==null && ref[i]!==undefined;
    if (has) { cnt++; lastIdx=i; }
    var isSel = AM===i;
    h += '<div class="cov-tl-m" onclick="setMonth('+i+')" title="'+MF[i]+'">';
    h += '<div class="cov-tl-pin '+(has?'ok':'no')+(isSel?' sel':'')+'">'+M[i][0]+'</div>';
    h += '<span class="cov-tl-lbl">'+M[i]+'</span>';
    h += '</div>';
  }
  document.getElementById('cov').innerHTML = h;
  var fillPct = lastIdx>=0 ? Math.round(lastIdx/11*100) : 0;
  document.getElementById('cov-fill').style.width = fillPct+'%';
  document.getElementById('cov-txt').textContent = cnt+'/12 meses preenchidos';
  document.querySelectorAll('.mbtn[data-m]').forEach(function(b){
    var mi = parseInt(b.getAttribute('data-m'));
    if (mi>=0) b.classList.toggle('empty', ref[mi]===null||ref[mi]===undefined);
  });
}

/* ═══════════════════════════════════════════
   KPI CARDS — GRID UNIFORME V2
═══════════════════════════════════════════ */
function buildKpiHtml() {
  var d = DATA[AY];
  var items = [];

  for (var ki=0;ki<KPI_KEYS.length;ki++) {
    var k=KPI_KEYS[ki], dd=d[k];
    if (!dd) continue;
    var v, note='';
    if (k==='acid') {
      v=0; for(var i=0;i<dd.v.length;i++) if(dd.v[i]!==null&&dd.v[i]!==undefined) v+=dd.v[i];
      note='Acumulado no ano';
    } else {
      var lv=lastFilled(dd.v);
      if (!lv) continue;
      v=lv.v; note=M[lv.m];
    }
    var ok=isOk(v,dd);
    var barPct;
    if (dd.lo) {
      barPct = v===0 ? 100 : Math.max(0,Math.min(100,Math.round((1-v/dd.meta)*100)));
    } else {
      barPct = Math.min(100,Math.round((v/dd.meta)*100));
    }
    items.push({k:k,dd:dd,v:v,note:note,ok:ok,barPct:barPct});
  }

  var okItems  = items.filter(function(it){return it.ok===true;});
  var nokItems = items.filter(function(it){return it.ok===false;});
  var total    = items.filter(function(it){return it.ok!==null;}).length;

  var h = '';

  /* ── Barra de status escura ── */
  h += '<div class="kpi-v2-sum">';
  h += '<div class="kpi-v2-blk">';
  h += '<div class="kpi-v2-blk-n" style="color:#4ade80">'+okItems.length+'<span style="font-size:22px;font-weight:400;opacity:.45">/'+total+'</span></div>';
  h += '<div class="kpi-v2-blk-l">dentro da meta</div></div>';
  h += '<div class="kpi-v2-sdiv"></div>';
  h += '<div class="kpi-v2-blk">';
  h += '<div class="kpi-v2-blk-n" style="color:#f87171">'+nokItems.length+'</div>';
  h += '<div class="kpi-v2-blk-l">fora da meta</div></div>';
  h += '<div class="kpi-v2-sdiv"></div>';
  h += '<div class="kpi-v2-leg">';
  var LCATS=['Produção','Satisfação','Qualidade','Segurança','Meio Ambiente'];
  for (var li=0;li<LCATS.length;li++) {
    var lc=LCATS[li], lclr=CAT_COLORS[lc]||'#888';
    h += '<span class="kpi-v2-legit"><span class="kpi-v2-legdot" style="background:'+lclr+'"></span>'+lc+'</span>';
  }
  h += '</div></div>';

  /* ── Grid: fora da meta primeiro, depois OK ── */
  var allItems = nokItems.concat(okItems);
  h += '<div class="kpi-v2-grid">';
  for (var i=0;i<allItems.length;i++) {
    var it=allItems[i];
    var catClr = CAT_COLORS[it.dd.cat]||'#888';
    var isFail = it.ok===false;
    var accentClr = isFail ? '#d32f2f' : catClr;
    var fillClr   = isFail ? '#d32f2f' : catClr;
    var fillPct;
    if (isFail) {
      fillPct = it.dd.lo ? Math.min(100,Math.round(it.v/it.dd.meta*100)) : it.barPct;
    } else {
      fillPct = it.barPct;
    }
    h += '<div class="kpi-v2-card">';
    h += '<div class="kpi-v2-bar-top" style="background:'+accentClr+'"></div>';
    h += '<div class="kpi-v2-inner">';
    h += '<div class="kpi-v2-head">';
    h += '<span class="kpi-v2-cat"><span class="kpi-v2-cdot" style="background:'+catClr+'"></span>'+it.dd.cat+'</span>';
    h += '<span class="kpi-v2-status '+(isFail?'nok':'ok')+'">'+(isFail?'✗':'✓')+'</span>';
    h += '</div>';
    h += '<div class="kpi-v2-name">'+it.dd.lb+'</div>';
    h += '<div class="kpi-v2-val">'+fmt(it.v,it.dd.un)+'</div>';
    h += '<div class="kpi-v2-note">'+it.note+'</div>';
    h += '<div class="kpi-v2-prog-bg"><div class="kpi-v2-prog-fill" style="width:'+fillPct+'%;background:'+fillClr+'"></div></div>';
    h += '<div class="kpi-v2-meta">Meta: '+mStr(it.dd)+'</div>';
    h += '</div></div>';
  }
  h += '</div>';

  return h;
}

/* ═══════════════════════════════════════════
   TABELA MENSAL
═══════════════════════════════════════════ */
function buildMonthHtml() {
  var yD=DATA[AY], yO=OBS[AY]||{}, rows='', cnt=0;
  for (var si=0;si<SECS.length;si++) {
    var sec=SECS[si], sRows='';
    for (var ki=0;ki<sec.ks.length;ki++) {
      var k=sec.ks[ki], dd=yD[k];
      if (!dd) continue;
      var v=dd.v[AM], ok2=isOk(v,dd), obs=(yO[k]||{})[AM]||'';
      var st = (v===null||v===undefined) ? '<span class="st-nd">— sem dado</span>'
             : ok2 ? '<span class="st-ok">✓ OK</span>'
             : '<span class="st-nok">✗ Fora da meta</span>';
      sRows += '<tr><td>'+dd.lb+'</td><td><strong>'+fmt(v,dd.un)+'</strong></td><td>'+mStr(dd)+'</td><td>'+st+'</td><td>'+(obs?'<div class="obs">💬 '+obs+'</div>':'')+'</td></tr>';
      if (v!==null&&v!==undefined) cnt++;
    }
    if (sRows) rows += '<tr class="cat"><td colspan="5">'+sec.ic+' '+sec.n+'</td></tr>'+sRows;
  }
  return '<div class="mtable-wrap"><div class="mtable-hdr">📋 Resumo — '+MF[AM]+' / '+AY+'<small>'+cnt+' indicadores com dados</small></div><table class="mt"><thead><tr><th>Indicador</th><th>Valor</th><th>Meta</th><th>Status</th><th>Observação</th></tr></thead><tbody>'+rows+'</tbody></table></div>';

/* ═══════════════════════════════════════════
   HTML DOS GRÁFICOS
═══════════════════════════════════════════ */
function buildChartsHtml() {
  var yD=DATA[AY], h='', queue=[];
  for (var si=0;si<SECS.length;si++) {
    var sec=SECS[si], avail=[];
    for (var ki=0;ki<sec.ks.length;ki++) if(yD[sec.ks[ki]]) avail.push(sec.ks[ki]);
    if (!avail.length) continue;
    h += '<div class="shdr"><div class="shdr-ic">'+sec.ic+'</div><h2>'+sec.n+'</h2><div class="shdr-line"></div></div>';
    h += '<div class="cgrid">';
    for (var ai=0;ai<avail.length;ai++) {
      var k=avail[ai], dd=yD[k], wide=sec.wide.indexOf(k)>=0, cid='ch-'+AY+'-'+k;
      h += '<div class="ccard'+(wide?' wide':'')+'"><div class="ctitle">'+dd.lb+'</div><div class="csub">Meta: '+mStr(dd)+'</div><div class="cwrap"><canvas id="'+cid+'"></canvas></div></div>';
      queue.push({id:cid, k:k});
    }
    h += '</div>';
  }
  var sy=AY, sm=AM, sq=queue;
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      for(var i=0;i<sq.length;i++){
        (function(item){ try{ makeChart(item.id,sy,item.k,sm); }catch(e){ console.error(item.id,e); } })(sq[i]);
      }
    });
  });
  return h;
}

/* ═══════════════════════════════════════════
   CHART.JS
═══════════════════════════════════════════ */
var CB='#1a6fc4', CBF='rgba(26,111,196,0.12)', CGR='#1a9e58', CRD='#d32f2f', CHL='#f59e0b';

function makeChart(cid, year, key, selM) {
  var d = DATA[year][key];
  if (!d) return;
  var el = document.getElementById(cid);
  if (!el) return;
  if (CHR[cid]) { try{ CHR[cid].destroy(); }catch(e){} delete CHR[cid]; }

  var vals = d.v, type = d.tp || 'bar';

  if (type === 'bar') {
    /* ── Gráfico de barras: um dataset + plugin de linha de meta ── */
    var bg=[], bd=[];
    for (var i=0;i<vals.length;i++) {
      var v=vals[i];
      if (v===null||v===undefined){bg.push('rgba(0,0,0,0)');bd.push('rgba(0,0,0,0)');continue;}
      var hl=selM>=0&&i===selM, good=isOk(v,d);
      bg.push(hl?CHL+'bb':(good?CGR+'66':CRD+'66'));
      bd.push(hl?CHL:(good?CGR:CRD));
    }
    CHR[cid] = new Chart(el.getContext('2d'),{
      type:'bar',
      data:{labels:M, datasets:[{label:'Realizado',data:vals,backgroundColor:bg,borderColor:bd,borderWidth:1.5,borderRadius:4}]},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:false},
          metaLine:{value:d.meta, label:mStr(d)},
          tooltip:{callbacks:{label:function(c){
            if(c.raw===null||c.raw===undefined) return c.dataset.label+': —';
            return c.dataset.label+': '+fmt(c.raw,d.un);
          }}}
        },
        scales:{
          x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11},color:'#5d6e85'}},
          y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#5d6e85'},beginAtZero:true}
        }
      }
    });
  } else {
    /* ── Gráfico de linha: realizado + linha de meta como segundo dataset ── */
    var metaArr=[], ptBg=[], ptR=[];
    for(var i=0;i<12;i++) metaArr.push(d.meta);
    for(var i=0;i<vals.length;i++){
      var v2=vals[i];
      if(v2===null||v2===undefined){ptBg.push('transparent');ptR.push(0);continue;}
      var hl2=selM>=0&&i===selM, good2=isOk(v2,d);
      ptBg.push(hl2?CHL:(good2?CGR:CRD));
      ptR.push(hl2?8:4);
    }
    CHR[cid] = new Chart(el.getContext('2d'),{
      type:'line',
      data:{labels:M, datasets:[
        {label:'Realizado', data:vals, borderColor:CB, backgroundColor:CBF, borderWidth:2.5,
         fill:true, tension:0.38, spanGaps:false,
         pointRadius:ptR, pointBackgroundColor:ptBg, pointBorderColor:'#fff', pointBorderWidth:1.5},
        {label:'Meta', data:metaArr, borderColor:'#c0192b', backgroundColor:'transparent',
         borderWidth:2, borderDash:[7,4], pointRadius:0, tension:0, fill:false}
      ]},
      options:{
        responsive:true, maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{
          legend:{display:true, position:'top', align:'end',
            labels:{font:{size:11}, boxWidth:28, boxHeight:3, padding:10, color:'#5d6e85'}},
          metaLine:{value:null},
          tooltip:{callbacks:{label:function(c){
            if(c.raw===null||c.raw===undefined) return c.dataset.label+': —';
            return c.dataset.label+': '+fmt(c.raw,d.un);
          }}}
        },
        scales:{
          x:{grid:{color:'rgba(0,0,0,0.04)'},ticks:{font:{size:11},color:'#5d6e85'}},
          y:{grid:{color:'rgba(0,0,0,0.05)'},ticks:{font:{size:11},color:'#5d6e85'},beginAtZero:true}
        }
      }
    });
  }
}

function openEdit() {

function populateEditForm() {
  var year  = document.getElementById('edit-year').value;
  var month = parseInt(document.getElementById('edit-month').value);
  var yData = DATA[year];
  if (!yData) return;
  var yObs = OBS[year] || {};

  var html = '<div class="edrow-hd"><span>Indicador</span><span style="text-align:right">Valor</span><span style="text-align:center">Un.</span><span style="text-align:right;color:#7f77dd">Meta (ano)</span><span>Observação</span></div>';

  for (var si = 0; si < SECS.length; si++) {
    var sec = SECS[si];
    var sRows = '', hasAny = false;
    for (var ki = 0; ki < sec.ks.length; ki++) {
      var k  = sec.ks[ki];
      var dd = yData[k];
      if (!dd) continue;
      hasAny = true;
      var curV   = dd.v[month];
      var valStr = (curV !== null && curV !== undefined) ? String(curV) : '';
      var curObs = ((yObs[k] || {})[month]) || '';
      var ph     = dd.un === 'n' ? 'ex: 15000' : (dd.un === 'kg' ? 'ex: 520' : 'ex: 97.5');
      sRows += '<div class="edrow">';
      sRows += '<div class="edlb">' + dd.lb + '</div>';
      sRows += '<input class="edinput" type="number" step="any" placeholder="' + ph + '" value="' + valStr + '" data-key="' + k + '">';
      sRows += '<span class="edunit">' + dd.un + '</span>';
      sRows += '<input class="edmetainput" type="number" step="any" value="' + dd.meta + '" data-meta="' + k + '" title="Meta atual: ' + mStr(dd) + '">';
      sRows += '<input class="edobsinput" type="text" placeholder="Observação" value="' + curObs.replace(/"/g,'&quot;') + '" data-obs="' + k + '">';
      sRows += '</div>';
    }
    if (hasAny) {
      html += '<div class="edsec"><div class="edsec-hdr">' + sec.ic + ' ' + sec.n + '</div>' + sRows + '</div>';
    }
  }

  document.getElementById('edit-form').innerHTML = html;
}

function saveEditForm() {
  var year  = document.getElementById('edit-year').value;
  var month = parseInt(document.getElementById('edit-month').value);
  if (!DATA[year]) return;
  OBS[year] = OBS[year] || {};

  // Salva valores mensais
  document.querySelectorAll('#edit-form .edinput').forEach(function(inp) {
    var k   = inp.getAttribute('data-key');
    var raw = inp.value.trim();
    DATA[year][k].v[month] = raw !== '' ? parseFloat(raw) : null;
  });

  // Salva metas (valem para o ano todo)
  document.querySelectorAll('#edit-form .edmetainput').forEach(function(inp) {
    var k   = inp.getAttribute('data-meta');
    var raw = inp.value.trim();
    if (raw !== '' && !isNaN(parseFloat(raw))) {
      DATA[year][k].meta = parseFloat(raw);
      delete DATA[year][k].mt; // remove texto fixo se existia, para mostrar o novo valor
    }
  });

  // Salva observações
  document.querySelectorAll('#edit-form .edobsinput').forEach(function(inp) {
    var k   = inp.getAttribute('data-obs');
    var obs = inp.value.trim();
    if (!OBS[year][k]) OBS[year][k] = {};
    if (obs) OBS[year][k][month] = obs;
    else     delete OBS[year][k][month];
  });

  AY = year; AM = month;
  closeEdit();
  render();
  showToast('✓ ' + MF[month] + ' / ' + year + ' atualizado com sucesso!', 'ok');
}

/* ═══════════════════════════════════════════
   IMPORTAÇÃO DE PLANILHA EXCEL
═══════════════════════════════════════════ */

// Mapa: texto na planilha → chave no DATA
// ATENÇÃO: ordem importa — mais específico primeiro
var IMAP = [
  ['SATISFAÇÃO DO CLIENTE JURÍDICO', 'satj'],
  ['NÚMERO DE RECLAMAÇÕES MEDICOS',  'recmed'],
  ['ATRASO DE LAUDO APOIO HERMES PARDINI', 'atpardini'],
  ['ATRASO DE LAUDO APOIO DB',       'atdb'],
  ['ÍNDICE DE RECOLETA APOIO - PARDINI', 'rpardini'],
  ['ÍNDICE DE RECOLETA APOIO - DB',  'rdb'],
  ['NÚMERO DE ATENDIMENTOS',         'atendimentos'],
  ['QUANT. EXAMES',                  'exames'],
  ['HORAS DE TREINAMENTOS',          'treino'],
  ['RECOLETAS',                      'recoletas'],
  ['SATISFAÇÃO DO CLIENTE',          'sat'],
  ['NPS - NET PROMOTER SCORE',       'nps'],
  ['NÚMERO DE RECLAMAÇÕES',          'reclam'],
  ['DESEMPENHO PNCQ',                'pncq'],
  ['ATRASO DE LAUDOS',               'atraso'],
  ['RETIFICAÇÃO DE LAUDOS',          'retif'],
  ['ACIDENTE DE TRABALHO',           'acid'],
  ['QUANT. LIXO',                    'lixo'],
  ['LAUDOS COM ERROS DE DIGITAÇÃO',  'laudoerr'],
  ['ERROS DE CADASTRO',              'errocad'],
];

var MMAP = {
  'JANEIRO':0,'FEVEREIRO':1,'MARÇO':2,'ABRIL':3,
  'MAIO':4,'JUNHO':5,'JULHO':6,'AGOSTO':7,
  'SETEMBRO':8,'OUTUBRO':9,'NOVEMBRO':10,'DEZEMBRO':11
};

// Indicadores onde se max < 2 → eram decimais, precisa ×100
var SCALE_BIG  = ['sat','nps','pncq'];      // meta alta, às vezes armazenado como 0.9748
// Indicadores onde valores são frações minúsculas (0.0014 = 0.14%)
var SCALE_TINY = ['recoletas'];             // sempre ×100 se max < 0.02

function matchIndicator(norm) {
  for (var i = 0; i < IMAP.length; i++) {
    if (norm === IMAP[i][0] || norm.indexOf(IMAP[i][0]) === 0) return IMAP[i][1];
  }
  return null;
}

function toNum(raw) {
  if (raw === null || raw === undefined || raw === '') return null;
  if (typeof raw === 'number') return raw;
  // Valores textuais como '1h', '3h' (Horas Treinamento 2026)
  var n = parseFloat(String(raw).replace(/[^\d.]/g, ''));
  return isNaN(n) ? null : n;
}

function scaleVals(key, vals) {
  var nonNull = vals.filter(function(v){ return v !== null; });
  if (!nonNull.length) return vals;
  var mx = Math.max.apply(null, nonNull);

  if (SCALE_TINY.indexOf(key) >= 0 && mx < 0.02) {
    // Armazenado como 0.0014 → deve ser 0.14%
    return vals.map(function(v){ return v !== null ? Math.round(v * 10000) / 100 : null; });
  }
  if (SCALE_BIG.indexOf(key) >= 0 && mx < 2) {
    // Armazenado como 0.9748 → deve ser 97.48%
    return vals.map(function(v){ return v !== null ? Math.round(v * 10000) / 100 : null; });
  }
  return vals;
}

function parseSheet(year, rows) {
  OBS[year] = OBS[year] || {};

  var curKey  = null;
  var curVals = [null,null,null,null,null,null,null,null,null,null,null,null];
  var curObs  = {};

  function commit() {
    if (!curKey || !DATA[year] || !DATA[year][curKey]) return;
    DATA[year][curKey].v = scaleVals(curKey, curVals);
    if (Object.keys(curObs).length) OBS[year][curKey] = curObs;
  }

  for (var r = 0; r < rows.length; r++) {
    var row = rows[r];
    if (!row || row[0] === null || row[0] === undefined) continue;
    var norm = String(row[0]).trim().toUpperCase().replace(/\s+/g, ' ');

    if (MMAP.hasOwnProperty(norm)) {
      // Linha de dado mensal
      if (curKey !== null) {
        var mi  = MMAP[norm];
        var raw = toNum(row[1]);
        curVals[mi] = raw;
        if (row[2] && String(row[2]).trim()) {
          curObs[mi] = String(row[2]).trim();
        }
      }
    } else {
      // Nova linha de indicador — tenta mapear
      var key = matchIndicator(norm);
      if (key !== null) {
        commit();
        curKey  = key;
        curVals = [null,null,null,null,null,null,null,null,null,null,null,null];
        curObs  = {};
      }
    }
  }
  commit();
}

function handleFiles(files) {
  if (!files || !files[0]) return;
  var file = files[0];
  document.getElementById('imp-status').textContent = '⏳ Lendo arquivo...';

  var reader = new FileReader();
  reader.onload = function(e) {
    try {
      var wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
      var updated = [];
      wb.SheetNames.forEach(function(sname) {
        if (!DATA[sname]) return;
        var rows = XLSX.utils.sheet_to_json(wb.Sheets[sname], {header:1, defval:null, raw:true});
        parseSheet(sname, rows);
        updated.push(sname);
      });
      if (!updated.length) {
        document.getElementById('imp-status').style.color = '#d32f2f';
        document.getElementById('imp-status').textContent = '⚠ Nenhuma aba reconhecida (esperado: 2023, 2025, 2026).';
        return;
      }
      // Alterna para o ano mais recente encontrado
      AY = updated[updated.length - 1]; AM = -1;
      closeImport();
      render();
      showToast('✓ Dados atualizados: ' + updated.join(', '), 'ok');
    } catch(err) {
      document.getElementById('imp-status').style.color = '#d32f2f';
      document.getElementById('imp-status').textContent = 'Erro: ' + err.message;
      console.error(err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function openImport() {
  document.getElementById('imp-status').textContent = '';
  document.getElementById('imp-file').value = '';
  document.getElementById('imp-overlay').classList.add('show');
}
function closeImport() {
  document.getElementById('imp-overlay').classList.remove('show');
}

function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type || 'ok';
  t.style.display = 'block';
  setTimeout(function(){ t.style.display = 'none'; }, 4000);
}
</script>
